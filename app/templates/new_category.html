{{ extends 'base.html' }}

{% block content %}
    <h1>New Category</h1>
    <form action="{{ url_for('new_category') }}" method="post">
        {% form.hidden_tag() %}
        <p>
            {{ form.name.label }}<br>
            {{ form.name() }}
        </p>
        <p>
            {{ form.description.label }}<br>
            {{ form.description() }}
        </p>
        <p>
            {{ form.submit() }}
        </p>
    </form>

    <a href="{{ url_for('index') }}">
        <p>Back to products</p>
    </a>
{% endblock %}
